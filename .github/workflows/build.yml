name: Docker Build and Publish

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: build-and-publish

jobs:
  docker-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        env:
          SOURCE_DATE_EPOCH: 0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}

  update-config:
    needs: docker-build
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1
        with:
          ref: main

      - name: Update tinfoil-config.yml
        run: |
          IMAGE="ghcr.io/${{ github.repository }}"
          DIGEST="${{ needs.docker-build.outputs.digest }}"
          sed -i "s|image: \"${IMAGE}[:@].*\"|image: \"${IMAGE}@${DIGEST}\" # ${GITHUB_REF_NAME}|" tinfoil-config.yml

      - name: Create Pull Request
        id: create-pr
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # 7.0.11
        with:
          branch: update-config/${{ github.ref_name }}
          commit-message: "chore: update container image to ${{ github.ref_name }}"
          title: "chore: update container image to ${{ github.ref_name }}"
          body: |
            Updates `tinfoil-config.yml` to use the container image built from tag `${{ github.ref_name }}` with digest `${{ needs.docker-build.outputs.digest }}`.

      - name: Merge Pull Request
        if: steps.create-pr.outputs.pull-request-number
        run: gh pr merge ${{ steps.create-pr.outputs.pull-request-number }} --rebase --admin --delete-branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push tinfoil tag
        if: steps.create-pr.outputs.pull-request-number
        run: |
          git fetch origin main
          git tag "tinfoil-${{ github.ref_name }}" origin/main
          git push origin "tinfoil-${{ github.ref_name }}"

      # Dispatch release as a separate workflow so that github.ref_name
      # resolves to the tinfoil tag (pri-build-action depends on this).
      # Using workflow_dispatch with --ref also avoids the GITHUB_TOKEN
      # limitation where tags pushed by Actions don't trigger tag-based workflows.
      - name: Trigger release workflow
        if: steps.create-pr.outputs.pull-request-number
        run: gh workflow run release.yml --ref "tinfoil-${{ github.ref_name }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
